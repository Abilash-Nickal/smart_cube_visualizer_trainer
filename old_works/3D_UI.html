<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAN Cube 3D Tracker (Fixed)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --text-dim: #94a3b8;
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .container { 
            width: 100%; max-width: 1000px; display: grid; 
            grid-template-columns: 1fr 350px; gap: 20px; margin-top: 20px;
        }
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }

        #canvas-container {
            width: 100%; height: 550px; background: #0b0f19;
            border-radius: 16px; border: 1px solid #334155;
            position: relative; overflow: hidden; cursor: grab;
        }

        .sidebar { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { margin: 0 0 10px 0; font-size: 24px; text-align: center; color: var(--primary); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            width: 100%; padding: 12px; background: #0b0f19; border: 1px solid #334155; 
            color: var(--success); font-family: 'JetBrains Mono', monospace; font-size: 14px; border-radius: 8px; 
            box-sizing: border-box; text-align: center; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--primary); }

        button {
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; margin-bottom: 10px;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button.active { background: var(--danger); }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: #0b0f19; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 20px; font-weight: bold; color: white; }

        #log {
            background: #0b0f19; padding: 10px; border-radius: 8px; border: 1px solid #334155;
            height: 200px; overflow-y: auto; font-family: monospace; font-size: 13px; color: #cbd5e1;
        }
        .log-entry { display: flex; justify-content: space-between; padding: 6px 8px; border-bottom: 1px solid #1e293b; }
        .log-entry:nth-child(even) { background: rgba(255,255,255,0.02); }
        .move-h { color: var(--warning); font-weight: bold; }
        
        #hud {
            position: absolute; top: 25px; left: 25px; pointer-events: none;
            text-shadow: 0 4px 8px rgba(0,0,0,0.8);
        }
        #last-move-hud { font-size: 80px; font-weight: 900; color: var(--success); line-height: 1; }
        #connection-status { font-size: 14px; font-weight: 600; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="canvas-container">
            <div id="hud">
                <div id="last-move-hud">--</div>
                <div id="connection-status" style="color: var(--text-dim);">SYSTEM OFFLINE</div>
            </div>
        </div>

        <div class="sidebar">
            <h1>GAN 3D CORE</h1>
            
            <div class="input-group">
                <label>Cube Hardware MAC</label>
                <input type="text" id="macAddress" placeholder="XX:XX:XX:XX:XX:XX">
            </div>

            <button id="connectBtn">INITIALIZE LINK</button>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Power</div>
                    <div id="batteryVal" class="stat-val">--%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Latency</div>
                    <div id="timeVal" class="stat-val">0ms</div>
                </div>
            </div>

            <div class="input-group">
                <label>Real-time Telemetry</label>
                <div id="log"></div>
            </div>

            <button style="background: #334155; font-size: 12px; margin-top: 10px;" onclick="resetCube()">RESET CAMERA</button>
        </div>
    </div>

    <script type="module">
        import { BTCube } from 'https://esm.sh/gan-i3-356-bluetooth@latest';

        const macInput = document.getElementById('macAddress');
        const connectBtn = document.getElementById('connectBtn');
        const logEl = document.getElementById('log');
        const batteryVal = document.getElementById('batteryVal');
        const timeVal = document.getElementById('timeVal');
        const lastMoveHud = document.getElementById('last-move-hud');
        const statusHud = document.getElementById('connection-status');

        let myCube = null;
        let cubePieces = [];
        let isAnimating = false;
        const moveQueue = [];

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        camera.position.set(5.5, 5, 8.5);
        camera.lookAt(0, 0, 0);

        const COLORS = { U: 0xffffff, D: 0xffd500, L: 0xff5800, R: 0xc41e3a, F: 0x009e60, B: 0x0051ba };

        function createCube() {
            const size = 0.96;
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        if (x === 0 && y === 0 && z === 0) continue;
                        const materials = [
                            new THREE.MeshLambertMaterial({ color: x === 1 ? COLORS.R : 0x18181b }), // Right
                            new THREE.MeshLambertMaterial({ color: x === -1 ? COLORS.L : 0x18181b }), // Left
                            new THREE.MeshLambertMaterial({ color: y === 1 ? COLORS.U : 0x18181b }), // Up
                            new THREE.MeshLambertMaterial({ color: y === -1 ? COLORS.D : 0x18181b }), // Down
                            new THREE.MeshLambertMaterial({ color: z === 1 ? COLORS.F : 0x18181b }), // Front
                            new THREE.MeshLambertMaterial({ color: z === -1 ? COLORS.B : 0x18181b })  // Back
                        ];
                        const piece = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), materials);
                        piece.position.set(x, y, z);
                        scene.add(piece);
                        cubePieces.push(piece);
                    }
                }
            }
        }
        createCube();

        // --- FIXED ANIMATION LOGIC ---
        function animateMove(moveStr) {
            if (isAnimating) {
                moveQueue.push(moveStr);
                return;
            }

            isAnimating = true;
            const face = moveStr[0];
            const isPrime = moveStr.includes("'");
            const isDouble = moveStr.includes("2");
            
            let axis, val;
            let directionMultiplier = 1;

            switch(face) {
                case 'U': axis = 'y'; val = 1;  directionMultiplier = -1; break; // Fixed inversion
                case 'D': axis = 'y'; val = -1; directionMultiplier = 1; break;
                case 'L': axis = 'x'; val = -1; directionMultiplier = 1; break;
                case 'R': axis = 'x'; val = 1;  directionMultiplier = -1; break; // Fixed inversion
                case 'F': axis = 'z'; val = 1;  directionMultiplier = -1; break; // Fixed inversion
                case 'B': axis = 'z'; val = -1; directionMultiplier = 1; break;
            }

            const group = new THREE.Group();
            scene.add(group);

            const activePieces = cubePieces.filter(p => Math.round(p.position[axis]) === val);
            activePieces.forEach(p => group.attach(p));

            // Set final target angle
            let angle = (Math.PI / 2) * directionMultiplier;
            if (isPrime) angle = -angle;
            if (isDouble) angle = Math.PI; // Double turn is same direction either way

            const duration = 120; // 120ms animation for snappy feel
            const startTime = performance.now();

            function step() {
                const now = performance.now();
                const progress = Math.min((now - startTime) / duration, 1);
                
                // Ease out cubic for smoothness
                const ease = 1 - Math.pow(1 - progress, 3);
                group.rotation[axis] = angle * ease;

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    group.updateMatrixWorld();
                    activePieces.forEach(p => {
                        scene.attach(p);
                        p.position.set(Math.round(p.position.x), Math.round(p.position.y), Math.round(p.position.z));
                    });
                    scene.remove(group);
                    isAnimating = false;
                    if (moveQueue.length > 0) animateMove(moveQueue.shift());
                }
            }
            step();
        }

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Camera Controls
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        container.onmousedown = (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; };
        window.onmouseup = () => isDragging = false;
        window.onmousemove = (e) => {
            if (!isDragging) return;
            const dx = (e.clientX - prevMouse.x) * 0.005;
            const dy = (e.clientY - prevMouse.y) * 0.005;
            
            const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(dy, dx, 0, 'XYZ'));
            camera.position.applyQuaternion(q);
            camera.lookAt(0,0,0);
            prevMouse = { x: e.clientX, y: e.clientY };
        };

        // --- BLUETOOTH INTEGRATION ---
        macInput.value = localStorage.getItem('cubeMacAddress') || "";
        
        connectBtn.onclick = async () => {
            const mac = macInput.value.trim();
            if (!mac) return;
            if (myCube) return location.reload();

            try {
                statusHud.innerText = "LINKING HARDWARE...";
                myCube = new BTCube();
                await myCube.init(mac);
                localStorage.setItem('cubeMacAddress', mac);

                connectBtn.innerText = "TERMINATE LINK";
                connectBtn.classList.add('active');
                statusHud.innerText = "LINK ESTABLISHED";
                statusHud.style.color = "var(--success)";

                myCube.on('move', (data) => {
                    const move = data.move;
                    lastMoveHud.innerText = move;
                    timeVal.innerText = `${data.time}ms`;
                    animateMove(move);

                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML = `<span class="move-h">${move}</span><span>${data.time}ms</span>`;
                    logEl.prepend(entry);
                });

                const internal = myCube.getCube();
                if (internal?.getBatteryLevel) {
                    const [lvl] = await internal.getBatteryLevel();
                    batteryVal.innerText = `${lvl}%`;
                }
            } catch (err) {
                statusHud.innerText = "LINK FAILED";
                statusHud.style.color = "var(--danger)";
            }
        };

        window.resetCube = () => {
            camera.position.set(5.5, 5, 8.5);
            camera.lookAt(0,0,0);
        };

        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    </script>
</body>
</html>
